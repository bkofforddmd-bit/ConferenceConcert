// Share a link via the phone's native share sheet; fall back to copying.
// Returns a short status string for optional UI feedback.
async function shareOrCopy({title,text,url}){
  try{
    if(navigator.share){
      await navigator.share({title,text,url});
      return "shared";
    }
  }catch(err){
    if(err&&err.name==="AbortError")return "cancelled"; // user closed the sheet
  }
  try{
    if(navigator.clipboard){ await navigator.clipboard.writeText(url); return "copied"; }
  }catch(_){}
  return "failed";
}

// A small reusable Share button.
function ShareButton({title,text,url,label,small,style}){
  const [status,setStatus]=useState("");
  async function go(ev){
    ev&&ev.stopPropagation();
    const r=await shareOrCopy({title,text,url});
    if(r==="copied")setStatus("Link copied!");
    else if(r==="failed")setStatus("Couldn't share");
    else setStatus("");
    if(r==="copied")setTimeout(()=>setStatus(""),2000);
  }
  return e("span",{style:{display:"inline-flex",alignItems:"center",gap:8}},
    e("button",{onClick:go,
      style:Object.assign({padding:small?"4px 12px":"8px 16px",fontSize:small?12:14,
        borderRadius:small?16:8,border:`1.5px solid ${C.blue}`,
        background:"transparent",color:C.blue,whiteSpace:"nowrap",cursor:"pointer"},style||{})},
      label||"Share"),
    status&&e("span",{style:{fontSize:12,color:C.src}},status));
}

function ytId(url){if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}

const BAND_EMAIL="conferenceasaconcert@gmail.com";

/* Build a mailto: link (kept as a fallback for phones / non-Gmail users). */
function buildMailto(recipients,subject,body){
  const bcc=(recipients||[]).filter(Boolean).join(",");
  const q="?bcc="+encodeURIComponent(bcc)+
    "&subject="+encodeURIComponent(subject)+
    "&body="+encodeURIComponent(body);
  return "mailto:"+encodeURIComponent(BAND_EMAIL)+q;
}

/* Build a Gmail compose URL that opens Gmail's own compose window with the To,
   Bcc, Subject, and body already filled in. This is a normal web link to Gmail,
   so the browser always opens it — no mail-app handler setup needed. */
function buildGmailCompose(recipients,subject,body){
  const bcc=(recipients||[]).filter(Boolean).join(",");
  return "https://mail.google.com/mail/?view=cm&fs=1"+
    "&to="+encodeURIComponent(BAND_EMAIL)+
    "&bcc="+encodeURIComponent(bcc)+
    "&su="+encodeURIComponent(subject)+
    "&body="+encodeURIComponent(body);
}

/* Share a link via the phone's native share sheet, falling back to copy on desktop.
   The URL is also appended to the text, because some apps (notably email) keep only
   one field — this guarantees the link travels no matter the channel. */
async function shareLink(title,text,url){
  const combined=text?(text+"\n"+url):url;
  try{
    if(navigator.share){
      await navigator.share({title,text:combined,url});
      return "shared";
    }
  }catch(err){
    if(err&&err.name==="AbortError")return "cancelled"; // user dismissed the sheet
  }
  try{
    if(navigator.clipboard){ await navigator.clipboard.writeText(combined); return "copied"; }
  }catch(_){}
  try{ window.prompt("Copy this link:",url); }catch(_){}
  return "copied";
}

/* One shared <audio> element drives all 20s previews so only one plays at a time. */
const previewAudio=typeof Audio!=="undefined"?new Audio():null;
let previewStopTimer=null, previewOnEnd=null;
function stopPreview(){
  if(previewStopTimer){clearTimeout(previewStopTimer);previewStopTimer=null;}
  if(previewAudio){previewAudio.pause();}
  if(previewOnEnd){const f=previewOnEnd;previewOnEnd=null;f();}
}
function playPreview(song,onEnd){
  if(!previewAudio||!song.audioUrl)return;
  stopPreview();
  previewOnEnd=onEnd||null;
  const start=Math.max(0,parseInt(song.previewStart,10)||0);
  previewAudio.src=song.audioUrl;
  const begin=()=>{try{previewAudio.currentTime=start;}catch(_){}
    previewAudio.play().catch(()=>{});
    previewStopTimer=setTimeout(stopPreview,PREVIEW_SECONDS*1000);};
  if(previewAudio.readyState>=1)begin();
  else previewAudio.addEventListener("loadedmetadata",begin,{once:true});
}

const CONCERT_MIN_SECONDS=15*60;   // slider floor: 15 minutes
const CONCERT_MAX_SECONDS=2*60*60; // slider ceiling: 2 hours
const CONCERT_DEFAULT_SECONDS=2*60*60; // default target

/* Effective length of a song in seconds: measured/auto value if known, else band
   duration, else a sensible default so totals stay meaningful. */
function songSeconds(song,measured){
  const m=measured&&measured[song.id];
  if(m&&m>0)return m;
  const d=parseInt(song.duration,10);
  if(d>0)return d;
  return 210; // ~3.5 min fallback when truly unknown
}
function fmtTime(total){
  total=Math.round(total);
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
  if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return m+":"+String(s).padStart(2,"0");
}
/* Read duration from an audio URL via a throwaway element. Resolves seconds or 0. */
function measureAudio(url){
  return new Promise((res)=>{
    if(!url||typeof Audio==="undefined")return res(0);
    const a=new Audio();
    a.preload="metadata";
    const done=(v)=>{a.src="";res(v);};
    a.addEventListener("loadedmetadata",()=>done(isFinite(a.duration)?a.duration:0),{once:true});
    a.addEventListener("error",()=>done(0),{once:true});
    a.src=url;
  });
}

/* The suggested live-show arc. `weight` is each section's relative share of the
   show; Opener/Closer are pinned small. Counts are computed from the target length. */
const ARC=[
  {key:"opener", label:"Opener",  weight:1, pinned:1, hint:"Gather everyone in — a warm, inviting song to begin."},
  {key:"build",  label:"Build",   weight:3,           hint:"Lift the energy. Momentum and joy."},
  {key:"reflect",label:"Reflect", weight:2,           hint:"A quieter, sacred moment to turn inward."},
  {key:"peak",   label:"Peak",    weight:2,           hint:"The testimony high point — the heart of the night."},
  {key:"closer", label:"Closer",  weight:1, pinned:1, hint:"Send them out — a song they carry home."},
];

/* Given a target length and an average song length, suggest a song count per
   arc section. Returns a map key -> [lo,hi]. Opener/Closer stay at 1. */
function scaledArc(targetSecs,avgSecs){
  const avg=avgSecs&&avgSecs>0?avgSecs:210;
  let totalSongs=Math.max(5,Math.round(targetSecs/avg)); // never fewer than the 5 sections
  // Pinned sections (Opener, Closer) take 1 each; distribute the rest by weight.
  const pinned=ARC.filter(s=>s.pinned).reduce((t,s)=>t+s.pinned,0);
  let remaining=Math.max(0,totalSongs-pinned);
  const flex=ARC.filter(s=>!s.pinned);
  const wsum=flex.reduce((t,s)=>t+s.weight,0);
  const out={};
  ARC.forEach(s=>{ if(s.pinned)out[s.key]=[1,1]; });
  let assigned=0;
  flex.forEach((s,i)=>{
    let n=Math.round(remaining*(s.weight/wsum));
    if(i===flex.length-1)n=remaining-assigned; // last flex soaks up rounding
    n=Math.max(1,n); assigned+=n;
    // express as a small range around n for "X–Y songs" guidance
    out[s.key]=[Math.max(1,n-1),n+1];
  });
  return out;
}
function targetText(t){
  const [lo,hi]=t;
  const n=lo===hi?lo+"":lo+"–"+hi;
  return n+" song"+(hi===1?"":"s")+" works well here";
}

/* --------------------------------------------- Scrolling lyrics panel */
/* Follows an <audio> element's progress and scrolls the lyrics so the current
   point in the song stays centered. Falls back gracefully if no duration yet. */
function ScrollingLyrics({audioRef,lyrics,height,delay,endBuffer}){
  const boxRef=React.useRef(null);
  const innerRef=React.useRef(null);
  const lead=(delay==null?35:Math.max(0,delay));        // seconds to hold before scrolling
  const tailSecs=(endBuffer==null?30:Math.max(0,endBuffer)); // finish this many seconds before the end
  useEffect(()=>{
    if(!lyrics)return;
    let raf;
    const tick=()=>{
      const a=audioRef&&audioRef.current, box=boxRef.current, inner=innerRef.current;
      if(a&&box&&inner&&a.duration&&isFinite(a.duration)&&a.duration>0){
        const dur=a.duration;
        // Scroll across the window from the lead-in to (end - tail), so the last
        // lyric lands ~tailSecs before the audio finishes instead of at the very end.
        const endAt=Math.max(lead+1,dur-tailSecs);
        const span=Math.max(1,endAt-lead);
        const frac=Math.min(1,Math.max(0,(a.currentTime-lead)/span));
        const scrollable=Math.max(0,inner.scrollHeight-box.clientHeight);
        box.scrollTop=scrollable*frac;
      }
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[lyrics,audioRef,lead,tailSecs]);
  if(!lyrics)return null;
  return e("div",{ref:boxRef,style:{maxHeight:height||220,overflow:"hidden",
    borderRadius:8,background:C.cream,border:`1px solid ${C.line}`,
    padding:"16px 18px",marginTop:14,
    maskImage:"linear-gradient(to bottom,transparent,#000 14%,#000 86%,transparent)",
    WebkitMaskImage:"linear-gradient(to bottom,transparent,#000 14%,#000 86%,transparent)"}},
    e("pre",{ref:innerRef,style:{whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",
      fontSize:15,lineHeight:1.8,color:C.text,margin:0,textAlign:"center"}},lyrics));
}

    mode==="audio"&&hasAudio&&e("div",{style:{padding:"6px 0"}},

      e(ShareButton,{small:true,label:"Share song",
        title:"Conference as a Concert",
        url:location.origin+location.pathname+"?song="+encodeURIComponent(song.id),
        text:"♪ “"+song.title+"”"+(song.talk?" — from “"+song.talk+"”":"")+" on Conference as a Concert"})),
  );
}

/* ------------------------------------------------------ Preview button */
function PreviewButton({song,small}){
  const [playing,setPlaying]=useState(false);
  useEffect(()=>()=>{ if(playing) stopPreview(); },[]);
  if(!song.audioUrl)return null;
  const toggle=(ev)=>{
    ev.stopPropagation();
    if(playing){stopPreview();setPlaying(false);}
    else{setPlaying(true);playPreview(song,()=>setPlaying(false));}
  };
  return e("button",{onClick:toggle,"aria-pressed":playing,
    title:"Hear a 20-second preview",
    style:{padding:small?"3px 10px":"5px 13px",fontSize:small?12:13,borderRadius:16,
      border:`1.5px solid ${playing?C.gold:C.line}`,
      background:playing?C.gold:"transparent",color:playing?C.brown:C.src,
      whiteSpace:"nowrap",transition:"all .15s"}},
    playing?"◼ Stop":"▶ 20s preview");
}

/* ---------------------------------------------------------- Library */
function Library({songs,loading,error,onReload,focusId}){
  const [group,setGroup]=useState("session");
  const [query,setQuery]=useState("");
  const [openId,setOpenId]=useState(null);
  const canEdit=!!sessionStorage.getItem("cac_pw");
  // Open a song that was deep-linked via ?song=ID, once songs have loaded.
  useEffect(()=>{
    if(focusId&&songs.some(s=>s.id===focusId)){
      setOpenId(focusId);
      setTimeout(()=>{const el=document.getElementById("song-"+focusId);
        if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},300);
    }
  },[focusId,songs]);
  const filtered=useMemo(()=>{
    const q=query.trim().toLowerCase();
    if(!q)return songs;
    return songs.filter(s=>[s.title,s.talk,s.speaker,s.theme,s.session,s.style]
      .filter(Boolean).join(" ").toLowerCase().includes(q));
  },[query,songs]);
  const groups=useMemo(()=>{
    if(group==="flat")return[{name:null,items:filtered}];
    const map=new Map();
    filtered.forEach(s=>{const k=s[group]||"Other";if(!map.has(k))map.set(k,[]);map.get(k).push(s);});
    return[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([name,items])=>({name,items}));
  },[group,filtered]);

  return e("main",{style:{maxWidth:920,margin:"0 auto",padding:"0 20px 60px"}},
    e("div",{style:{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center",
      justifyContent:"space-between",padding:"22px 0 6px"}},
      e("div",{role:"group","aria-label":"Group songs by",
        style:{display:"flex",flexWrap:"wrap",gap:6}},
        e("span",{style:{fontSize:13,color:C.src,alignSelf:"center",marginRight:4}},"Group by:"),
        GROUPINGS.map(g=>e("button",{key:g.key,onClick:()=>setGroup(g.key),
          "aria-pressed":group===g.key,
          style:{padding:"7px 14px",fontSize:14,borderRadius:20,
            border:`1.5px solid ${group===g.key?C.gold:C.line}`,
            background:group===g.key?C.gold:C.paper,
            color:group===g.key?"#0A1628":C.text}},g.label))),
      e("input",{type:"search",value:query,onChange:ev=>setQuery(ev.target.value),
        placeholder:"Search title, talk, speaker…","aria-label":"Search songs",
        style:{flex:"1 1 220px",maxWidth:300,padding:"9px 14px",fontSize:15,
          borderRadius:8,border:`1.5px solid ${C.line}`,background:C.paper,color:C.text}})),
    loading&&e("p",{style:{textAlign:"center",color:C.src,padding:"40px 0",fontStyle:"italic"}},
      "Loading the library…"),
    canEdit&&!loading&&e("div",{style:{background:C.paper,border:`1.5px solid ${C.gold}`,
      borderRadius:8,padding:"8px 14px",margin:"4px 0 14px",fontSize:13,color:C.src}},
      "Band mode is on — open any song to edit its details."),
    error&&e("p",{style:{textAlign:"center",color:"#E66A5C",padding:"20px 0"}},error),
    !loading&&!error&&filtered.length===0&&e("p",{style:{textAlign:"center",color:C.src,
      fontStyle:"italic",padding:"40px 0"}},
      songs.length===0?"No songs yet — the band will add the first one soon.":"No songs match your search."),
    groups.map((g,gi)=>e("section",{key:g.name||gi,style:{marginTop:gi?34:18}},
      g.name&&e("h2",{style:{fontSize:14,letterSpacing:"0.14em",textTransform:"uppercase",
        color:C.src,borderBottom:`1.5px solid ${C.line}`,paddingBottom:7,marginBottom:14}},
        g.name,e("span",{style:{color:"#7E97BD",marginLeft:8,fontSize:13}},g.items.length)),
      e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        g.items.map(s=>e(SongCard,{key:s.id,song:s,open:openId===s.id,
          canEdit,onEdited:onReload,
          onToggle:()=>setOpenId(openId===s.id?null:s.id)}))))),
  );
}

function SongEditor({song,onDone}){
  const [f,setF]=useState({
    title:song.title||"",talk:song.talk||"",speaker:song.speaker||"",
    session:song.session||"",theme:song.theme||"",style:song.style||"",
    talkUrl:song.talkUrl||"",youtube:song.youtube||"",
    previewStart:song.previewStart?String(song.previewStart):"",
    duration:song.duration?String(song.duration):"",
    lyricsDelay:song.lyricsDelay==null?"":String(song.lyricsDelay),
    lyricsEnd:song.lyricsEnd==null?"":String(song.lyricsEnd),
    lyrics:song.lyrics||"",blurb:song.blurb||"",
  });
  const [state,setState]=useState("idle");
  const [msg,setMsg]=useState("");
  const up=(k)=>(ev)=>setF({...f,[k]:ev.target.value});
  const pw=sessionStorage.getItem("cac_pw")||"";

  async function save(){
    setState("saving");setMsg("");
    try{
      const r=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"update",song:{...f,id:song.id}})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not save");

    }catch(err){setState("error");setMsg(err.message);}
  }
  async function del(){
    if(!window.confirm("Remove “"+song.title+"” from the library? This can't be undone."))return;

      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not delete");
      onDone&&onDone(true);
    }catch(err){setState("error");setMsg(err.message);}

        e("div",half,e("label",{style:lbl},"Session"),

function Suggest(){
  const [board,setBoard]=useState(null);
  const [boardErr,setBoardErr]=useState("");
  const [showForm,setShowForm]=useState(false);
  // voting modal state
  const [voteFor,setVoteFor]=useState(null); // suggestion being voted on
  const [email,setEmail]=useState(localStorage_get("cac_voter_email"));
  const [voteMsg,setVoteMsg]=useState("");
  const [votedIds,setVotedIds]=useState(()=>voted_set());

  async function loadBoard(){
    setBoardErr("");
    try{
      const r=await fetch(`${API}/suggest`,{method:"POST",
        headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"board"})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not load");
      setBoard(d.suggestions||[]);
    }catch(err){setBoardErr(err.message);setBoard([]);}
  }
  useEffect(()=>{loadBoard();},[]);

  async function castVote(){
    if(!voteFor)return;
    setVoteMsg("");
    try{
      const r=await fetch(`${API}/suggest`,{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"vote",id:voteFor.id,email})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not vote");
      localStorage_set("cac_voter_email",email);
      mark_voted(voteFor.id); setVotedIds(voted_set());
      setVoteFor(null); loadBoard();
    }catch(err){setVoteMsg(err.message);}
  }

  // ---- voting modal ----
  const modal=voteFor&&e("div",{style:{position:"fixed",inset:0,background:"rgba(5,12,24,.7)",
    display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:50},
    onClick:()=>setVoteFor(null)},
    e("div",{onClick:ev=>ev.stopPropagation(),
      style:{background:C.paper,border:`1.5px solid ${C.gold}`,borderRadius:14,
        padding:"24px",maxWidth:420,width:"100%"}},
      e("div",{style:{fontSize:18,fontWeight:"bold",color:C.gold,marginBottom:4}},
        "Want this too?"),
      e("div",{style:{fontSize:14,color:C.text,marginBottom:14,fontStyle:"italic"}},
        "“"+voteFor.talk+"”"),
      e("p",{style:{fontSize:13,color:C.src,lineHeight:1.5,marginTop:0,marginBottom:12}},
        "Enter your email to add your vote. We use it only to count one vote per person and to let the band gauge interest."),
      e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),
        placeholder:"you@example.com",style:{...field,marginBottom:10}}),
      voteMsg&&e("p",{style:{color:"#E66A5C",fontSize:13,margin:"0 0 10px"}},voteMsg),
      e("div",{style:{display:"flex",gap:10}},
        e("button",{onClick:castVote,
          style:{padding:"10px 20px",fontSize:14,borderRadius:8,border:0,
            background:C.gold,color:"#0A1628",fontWeight:"bold"}},"I want this, too!"),
        e("button",{onClick:()=>setVoteFor(null),
          style:{padding:"10px 18px",fontSize:14,borderRadius:8,
            border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},"Cancel"))));

  return e("main",{style:{maxWidth:680,margin:"0 auto",padding:"24px 20px 60px"}},
    modal,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",
      flexWrap:"wrap",gap:10,marginBottom:6}},
      e("h2",{style:{fontSize:16,letterSpacing:"0.08em",textTransform:"uppercase",
        color:C.gold,margin:0}},"Most-wanted talks"),
      e("button",{onClick:()=>setShowForm(!showForm),
        style:{padding:"9px 18px",fontSize:14,borderRadius:8,border:0,
          background:C.blue,color:"#0A1628",fontWeight:"bold"}},
        showForm?"Close":"+ Suggest a talk")),
    e("p",{style:{color:C.src,lineHeight:1.5,marginTop:0}},
      "Vote for the talks you'd love to hear as songs. Share one with friends to rally votes — the band watches what rises to the top."),

    showForm&&e(SuggestForm,{onSent:()=>{setShowForm(false);loadBoard();}}),

    board===null&&e("p",{style:{textAlign:"center",color:C.src,fontStyle:"italic",
      padding:"30px 0"}},"Loading the board…"),
    boardErr&&e("p",{style:{color:"#E66A5C"}},boardErr),
    board&&board.length===0&&e("p",{style:{textAlign:"center",color:C.src,fontStyle:"italic",
      padding:"30px 0"}},"No talks on the board yet — be the first to suggest one!"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:12,marginTop:8}},
      (board||[]).map((s,i)=>{
        const youVoted=votedIds.has(s.id);
        return e("div",{key:s.id,style:{background:C.paper,
          border:`1.5px solid ${i===0&&s.wants>0?C.gold:C.line}`,borderRadius:12,

            e("div",{style:{fontSize:11,color:C.src,letterSpacing:"0.04em"}},

            (s.speaker||s.session)&&e("div",{style:{fontSize:13,color:C.text,marginTop:2}},

            (s.lyricStyle||s.genre||s.mood)&&e("div",{style:{display:"flex",gap:6,
              flexWrap:"wrap",marginTop:8}},
              [s.lyricStyle,s.genre,s.mood].filter(Boolean).map((x,xi)=>

                  background:"#22375E",color:C.src}},x))),
            s.note&&e("div",{style:{fontSize:13,color:C.src,marginTop:6,fontStyle:"italic",
              lineHeight:1.5}},"“"+s.note+"”"),
            e("div",{style:{display:"flex",gap:10,flexWrap:"wrap",marginTop:12,alignItems:"center"}},
              youVoted
                ? e("span",{style:{fontSize:13,color:"#5FB87A",fontWeight:"bold"}},"✓ You want this")
                : e("button",{onClick:()=>{setVoteMsg("");setVoteFor(s);},
                    style:{padding:"7px 16px",fontSize:13,borderRadius:18,border:0,
                      background:C.gold,color:"#0A1628",fontWeight:"bold"}},
                    "♪ I want this, too!"),
              s.talkUrl&&e("a",{href:s.talkUrl,target:"_blank",rel:"noopener noreferrer",
                style:{fontSize:13,color:C.blue}},"Read talk →"),
              e(ShareButton,{small:true,label:"Recruit votes",
                title:"Conference as a Concert",
                url:location.origin+location.pathname+"?suggest="+encodeURIComponent(s.id),
                text:"🎵 Help me get “"+s.talk+"” turned into a song on Conference as a Concert — vote for it here:"}))));
      })),
  );
}

function SuggestionsInbox(){
  const [items,setItems]=useState(null);
  const [error,setError]=useState("");
  const [filter,setFilter]=useState("open"); // open|all
  const pw=sessionStorage.getItem("cac_pw")||"";

  async function load(){
    setError("");
    try{
      const r=await fetch(`${API}/suggest`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"list"})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not load");
      setItems(d.suggestions||[]);
    }catch(err){setError(err.message);setItems([]);}
  }
  useEffect(()=>{load();},[]);

  async function act(action,id,status,approved){
    try{
      await fetch(`${API}/suggest`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action,id,status,approved})});
      load();

  if(items===null)return e("main",{style:{maxWidth:720,margin:"0 auto",padding:"40px 20px"}},
    e("p",{style:{textAlign:"center",color:C.src,fontStyle:"italic"}},"Loading suggestions…"));

  const shown=items.filter(s=>filter==="all"||s.status!=="done");
  const fmtDate=(iso)=>{try{return new Date(iso).toLocaleDateString(undefined,
    {month:"short",day:"numeric",year:"numeric"});}catch(_){return"";}};

  return e("main",{style:{maxWidth:720,margin:"0 auto",padding:"24px 20px 60px"}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",
      flexWrap:"wrap",gap:10,marginBottom:16}},

        s.from&&e("div",{style:{fontSize:13,color:C.src,marginTop:6}},"— "+s.from),

          e("div",{style:{fontSize:12,color:C.src,marginTop:6,lineHeight:1.6,
            wordBreak:"break-all"}},s.voters.join(", "))),
        e("div",{style:{display:"flex",gap:10,flexWrap:"wrap",marginTop:12,alignItems:"center"}},
          s.talkUrl&&e("a",{href:s.talkUrl,target:"_blank",rel:"noopener noreferrer",
            style:{fontSize:13,color:C.blue}},"Open talk →"),
          s.approved
            ? e("button",{onClick:()=>act("approve",s.id,null,false),
                style:{padding:"6px 14px",fontSize:13,borderRadius:8,
                  border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},

            : e("button",{onClick:()=>act("approve",s.id,null,true),

          s.status!=="done"
            ? e("button",{onClick:()=>act("resolve",s.id,"done"),
                style:{padding:"6px 14px",fontSize:13,borderRadius:8,border:0,
                  background:C.blue,color:"#0A1628"}},"Mark done")
            : e("button",{onClick:()=>act("resolve",s.id,"new"),
                style:{padding:"6px 14px",fontSize:13,borderRadius:8,
                  border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},

          e("button",{onClick:()=>{if(window.confirm("Delete this suggestion?"))act("delete",s.id);},
            style:{padding:"6px 12px",fontSize:13,borderRadius:8,marginLeft:"auto",
              border:`1.5px solid #7A4A48`,background:"transparent",color:"#E66A5C"}},
            "Delete")),
        (()=>{
          const recipients=[s.email,...(Array.isArray(s.voters)?s.voters:[])].filter(Boolean);
          const appUrl=location.origin+location.pathname;
          if(recipients.length===0)return e("div",{style:{fontSize:12,color:C.src,
            marginTop:10,fontStyle:"italic"}},

            "Hi there,\n\n"+
            "Thank you for your interest in “"+s.talk+"” on Conference as a Concert! "+
            "We're grateful you took the time to suggest it"+
            (recipients.length>1?" (and to everyone who wanted it too).":".")+"\n\n"+
            "It's now posted on our suggestions board, where people can vote for it. "+
            "Come add your voice and rally others:\n"+appUrl+"\n\n"+
            "With gratitude,\nY-Mountain Music Co.";
          const readySubject="“"+s.talk+"” is now a song! — Conference as a Concert";
          const readyBody=
            "Hi there,\n\n"+
            "Wonderful news — the talk you were interested in, “"+s.talk+"”, "+
            "has been turned into a song and is now in our library!\n\n"+
            "Have a listen here:\n"+appUrl+"\n\n"+
            "Thank you for being part of this. We hope it blesses you.\n\n"+
            "With gratitude,\nY-Mountain Music Co.";
          const copyAll=(subject,bodyText)=>{
            const blob="To: "+BAND_EMAIL+"\nBcc: "+recipients.join(", ")+

          };
          return e("div",{style:{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.line}`}},

              " — addressed to "+BAND_EMAIL+", everyone in BCC"),

                  fontWeight:"bold"}},"✉️ Thank for suggesting"),
              e("a",{href:buildGmailCompose(recipients,readySubject,readyBody),
                target:"_blank",rel:"noopener noreferrer",
                style:{padding:"6px 14px",fontSize:13,borderRadius:8,textDecoration:"none",
                  border:`1.5px solid ${C.blue}`,background:"transparent",color:C.blue,
                  fontWeight:"bold"}},"✉️ Notify: song is ready")),
            e("div",{style:{display:"flex",gap:14,marginTop:8,alignItems:"center"}},
              e("span",{style:{fontSize:11,color:C.src,fontStyle:"italic"}},
                "Opens a Gmail compose window, ready to send."),
              e("button",{onClick:()=>copyAll(thankSubject,thankBody),
                style:{padding:"3px 10px",fontSize:11,borderRadius:6,

                "copy thank-you text"),

                style:{padding:"3px 10px",fontSize:11,borderRadius:6,
                  border:`1px solid ${C.line}`,background:"transparent",color:C.src}},

        })())),

  );
}

/* ------------------------------------------------------- Band upload */
function Band({onAdded,onBandChange}){
  const [pw,setPw]=useState(sessionStorage.getItem("cac_pw")||"");
  const [showPw,setShowPw]=useState(false);
  const [bandOn,setBandOn]=useState(!!sessionStorage.getItem("cac_pw"));
  const [pwState,setPwState]=useState("idle"); // idle|checking|error
  const [pwMsg,setPwMsg]=useState("");

  async function enterBandMode(){
    if(!pw.trim()){setPwState("error");setPwMsg("Enter the band password first.");return;}
    setPwState("checking");setPwMsg("");
    try{
      const r=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"verify"})});
      if(r.ok){
        sessionStorage.setItem("cac_pw",pw);
        setBandOn(true);setPwState("idle");setPwMsg("");
        onBandChange&&onBandChange();
      }else{
        setPwState("error");setPwMsg("That password didn't work.");
      }
    }catch(err){setPwState("error");setPwMsg("Couldn't check the password. Try again.");}
  }
  function exitBandMode(){
    sessionStorage.removeItem("cac_pw");
    setBandOn(false);setPwMsg("");
    onBandChange&&onBandChange();
  }
  const [file,setFile]=useState(null);
  const [drag,setDrag]=useState(false);
  const [s,setS]=useState({title:"",talk:"",speaker:"",session:"",theme:"",
    style:"",talkUrl:"",youtube:"",previewStart:"",duration:"",lyrics:"",lyricsDelay:"",lyricsEnd:"",blurb:""});
  const [state,setState]=useState("idle");
  const [msg,setMsg]=useState("");
  const [gdocUrl,setGdocUrl]=useState("");
  const [gdocState,setGdocState]=useState("idle"); // idle|loading|preview|error
  const [gdocMsg,setGdocMsg]=useState("");
  const [gdocPreview,setGdocPreview]=useState(""); // fetched text, awaiting confirmation
  const [projMsg,setProjMsg]=useState("");

  // Import everything from a music-video-studio project JSON.
  function importProject(f){
    if(!f)return;
    setProjMsg("Reading project file…");
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(String(r.result));
        // Prefer top-level talkMeta (set straight from the talk picker, always
        // present); fall back to scene.meta (only filled once the Scene
        // Organizer runs). Merge so either source can supply a field.
        const tm=d.talkMeta||{};
        const sm=(d.scene&&d.scene.meta)||{};
        const pick=(...vals)=>{for(const v of vals){if(v&&String(v).trim())return v;}return "";};
        const next={...s};
        // Song title: the creative name from scene.meta if set, else the talk title.
        const songTitle=pick(sm.songTitle,tm.title);
        if(songTitle)next.title=songTitle;
        // Source talk = the actual talk title.
        const talkTitle=pick(tm.title,sm.songTitle);
        if(talkTitle)next.talk=talkTitle;
        const speaker=pick(tm.speaker,sm.speaker);
        if(speaker)next.speaker=speaker;
        // The "Session" field is used for the conference label (e.g. "October 2025").
        const conf=pick(tm.conferenceMonthYear,sm.conferenceMonthYear);
        if(conf)next.session=conf;
        // The talk's actual session (e.g. "Saturday Morning Session") has no
        // dedicated field — drop it into the blurb if that's empty.
        const talkSession=pick(tm.session,sm.session);
        if(talkSession&&!next.blurb)next.blurb=talkSession;
        // Talk URL — newly carried through from the builder export.
        const url=pick(tm.sourceUrl,sm.sourceUrl);
        if(url)next.talkUrl=url;
        if(d.styleReference)next.style="after "+d.styleReference;
        const lyr=d.finalLyrics||d.lyrics;
        if(lyr)next.lyrics=lyr;
        setS(next);
        setProjMsg("Filled in from project file — review the fields, then add the MP3 and save.");
      }catch(err){setProjMsg("Couldn't read that file — make sure it's a project .json export.");}
    };
    r.onerror=()=>setProjMsg("Couldn't read that file.");
    r.readAsText(f);
  }
  const up=(k)=>(ev)=>setS({...s,[k]:ev.target.value});

  async function importGdoc(){
    if(!gdocUrl.trim()){setGdocState("error");setGdocMsg("Paste a Google Doc link first.");return;}
    setGdocState("loading");setGdocMsg("");setGdocPreview("");
    try{
      const r=await fetch(`${API}/gdoc`,{method:"POST",
        headers:{"Content-Type":"application/json"},body:JSON.stringify({url:gdocUrl})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not import");
      setGdocPreview(d.lyrics);
      setGdocState("preview");
      setGdocMsg("");
    }catch(err){setGdocState("error");setGdocMsg(err.message);}
  }
  function useImported(){
    setS(v=>({...v,lyrics:gdocPreview}));
    setGdocState("idle");setGdocPreview("");
    setGdocMsg("Lyrics added below — edit if needed before saving.");
  }
  function cancelImport(){
    setGdocState("idle");setGdocPreview("");setGdocMsg("");
  }

  function pick(f){
    if(!f)return;
    if(!/^audio\//.test(f.type)&&!/\.(mp3|m4a|wav|ogg|aac)$/i.test(f.name)){
      setMsg("Please choose an audio file (mp3, m4a, wav…).");setState("error");return;}
    setFile(f);setMsg("");if(state==="error")setState("idle");
    if(!s.title){const base=f.name.replace(/\.[^.]+$/,"");setS(v=>({...v,title:base}));}
  }
  // Read an audio file's duration (seconds) in the browser before saving.
  function readDuration(f){return new Promise((res)=>{
    try{
      const url=URL.createObjectURL(f); const a=new Audio();
      a.preload="metadata";
      a.addEventListener("loadedmetadata",()=>{const d=isFinite(a.duration)?Math.round(a.duration):0;
        URL.revokeObjectURL(url);res(d);},{once:true});
      a.addEventListener("error",()=>{URL.revokeObjectURL(url);res(0);},{once:true});
      a.src=url;
    }catch(_){res(0);}
  });}

  async function submit(){
    if(!pw){setState("error");setMsg("Enter the band password.");return;}
    if(!s.title.trim()){setState("error");setMsg("Give the song a title.");return;}
    if(!file&&!s.youtube&&!s.talkUrl){setState("error");
      setMsg("Add an MP3 or at least a YouTube link.");return;}
    setState("sending");setMsg(file?"Uploading…":"Saving…");
    try{
      const song={...s};
      if(file){
        // 1) ask the function for a presigned URL
        const ct=file.type||"audio/mpeg";
        const signRes=await fetch(`${API}/upload`,{method:"POST",
          headers:{"Content-Type":"application/json","x-upload-password":pw},
          body:JSON.stringify({action:"sign",filename:file.name,contentType:ct,titleHint:s.title})});
        const signData=await signRes.json();
        if(!signRes.ok)throw new Error(signData.error||"Could not start upload");
        // 2) upload the file bytes straight to R2 (bypasses Netlify size limit)
        const putRes=await fetch(signData.uploadUrl,{method:"PUT",
          headers:{"Content-Type":ct},body:file});
        if(!putRes.ok)throw new Error("File upload to storage failed ("+putRes.status+")");
        song.audioUrl=signData.publicUrl;
        // capture duration if the band didn't type one
        if(!s.duration){const dur=await readDuration(file); if(dur)song.duration=String(dur);}
      }
      // 3) save the song into the catalog
      const saveRes=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"save",song})});
      const d=await saveRes.json();
      if(!saveRes.ok)throw new Error(d.error||"Could not save song");
      sessionStorage.setItem("cac_pw",pw);
      setBandOn(true);onBandChange&&onBandChange();
      setState("done");setMsg("");setFile(null);
      setS({title:"",talk:"",speaker:"",session:"",theme:"",style:"",talkUrl:"",youtube:"",previewStart:"",duration:"",lyrics:"",lyricsDelay:"",lyricsEnd:"",blurb:""});
      setGdocUrl("");setGdocState("idle");setGdocMsg("");setGdocPreview("");setProjMsg("");
      onAdded&&onAdded(d.entry);
    }catch(err){setState("error");setMsg(err.message);}
  }

  return e("main",{style:{maxWidth:620,margin:"0 auto",padding:"28px 20px 60px"}},
    e("p",{style:{color:C.src,lineHeight:1.6,marginTop:0}},
      "Band members only. Drop an MP3, add the talk details, and the song goes live for everyone."),
    e("div",null,e("label",{style:lbl,htmlFor:"b-pw"},"Band password"),
      e("div",{style:{display:"flex",gap:8,alignItems:"center",maxWidth:320}},
        e("input",{id:"b-pw",type:showPw?"text":"password",style:{...field,maxWidth:260},value:pw,
          onChange:ev=>setPw(ev.target.value),placeholder:"••••••••"}),
        e("button",{type:"button",onClick:()=>setShowPw(!showPw),
          "aria-label":showPw?"Hide password":"Show password",
          style:{padding:"8px 12px",fontSize:13,borderRadius:8,
            border:`1.5px solid ${C.line}`,background:"transparent",color:C.src,
            whiteSpace:"nowrap"}},showPw?"Hide":"Show")),
      pw&&e("div",{style:{fontSize:12,color:C.src,marginTop:4}},
        "Length: "+pw.length+" characters"+(/^\s|\s$/.test(pw)?" — ⚠ starts or ends with a space":"")),
      e("div",{style:{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginTop:10}},
        bandOn
          ? e("span",{style:{fontSize:13,color:"#5FB87A",fontWeight:"bold"}},"✓ Band mode is on")
          : e("button",{onClick:enterBandMode,disabled:pwState==="checking",
              style:{padding:"9px 18px",fontSize:14,borderRadius:8,border:0,
                background:pwState==="checking"?"#3A5582":C.gold,color:"#0A1628",
                fontWeight:"bold"}},
              pwState==="checking"?"Checking…":"Enter band mode"),
        bandOn&&e("button",{onClick:exitBandMode,
          style:{padding:"8px 14px",fontSize:13,borderRadius:8,
            border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},
          "Sign out of band mode")),
      pwMsg&&e("div",{style:{fontSize:13,color:pwState==="error"?"#E66A5C":C.src,marginTop:6}},pwMsg),
      bandOn&&e("div",{style:{fontSize:13,color:C.src,marginTop:8,lineHeight:1.5}},
        "You can now review suggestions, approve them, and edit songs — even without uploading.")),
    e("div",{style:{marginTop:18,border:`1.5px solid ${C.gold}`,borderRadius:12,
      background:C.paper,padding:"16px 18px"}},
      e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:4}},
        "Quick fill from a project file"),
      e("p",{style:{fontSize:13,color:C.src,lineHeight:1.5,margin:"0 0 10px"}},
        "Have a music-video-studio project export (.json)? Drop it here to auto-fill the title, source talk, speaker, conference, talk link, style, and lyrics — then just add the MP3 below."),
      e("label",{style:{display:"inline-block",padding:"8px 16px",fontSize:14,
        borderRadius:8,background:C.blue,color:"#fff",cursor:"pointer"}},
        "Choose project .json",
        e("input",{type:"file",accept:".json,application/json",
          onChange:ev=>importProject(ev.target.files[0]),style:{display:"none"}})),
      projMsg&&e("div",{style:{fontSize:13,color:C.src,marginTop:8}},projMsg)),
    e("div",{onDragOver:ev=>{ev.preventDefault();setDrag(true);},
      onDragLeave:()=>setDrag(false),
      onDrop:ev=>{ev.preventDefault();setDrag(false);pick(ev.dataTransfer.files[0]);},
      style:{marginTop:18,border:`2.5px dashed ${drag?C.gold:C.line}`,borderRadius:12,
        background:drag?C.paper:"#1E3358",padding:"30px 20px",textAlign:"center",
        transition:"all .15s"}},
      e("div",{style:{fontSize:30,color:C.gold,marginBottom:6}},"♪"),
      e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:4}},
        file?file.name:"Drag an MP3 here"),
      e("div",{style:{fontSize:13,color:C.src,marginBottom:12}},
        file?`${(file.size/1048576).toFixed(1)} MB`:"or"),
      e("label",{style:{display:"inline-block",padding:"8px 18px",fontSize:14,
        borderRadius:8,background:C.blue,color:"#0A1628",cursor:"pointer"}},
        "Choose file",
        e("input",{type:"file",accept:"audio/*,.mp3,.m4a,.wav,.ogg,.aac",
          onChange:ev=>pick(ev.target.files[0]),style:{display:"none"}}))),
    e("div",{style:{display:"flex",flexDirection:"column",gap:14,marginTop:20}},
      e("div",null,e("label",{style:lbl,htmlFor:"b-title"},"Song title *"),
        e("input",{id:"b-title",style:field,value:s.title,onChange:up("title")})),
      e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        e("div",{style:{flex:"1 1 240px"}},e("label",{style:lbl,htmlFor:"b-talk"},"Source talk"),
          e("input",{id:"b-talk",style:field,value:s.talk,onChange:up("talk")})),
        e("div",{style:{flex:"1 1 160px"}},e("label",{style:lbl,htmlFor:"b-speaker"},"Speaker"),
          e("input",{id:"b-speaker",style:field,value:s.speaker,onChange:up("speaker")}))),
      e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        e("div",{style:{flex:"1 1 150px"}},e("label",{style:lbl,htmlFor:"b-session"},"Session"),
          e("input",{id:"b-session",style:field,value:s.session,onChange:up("session"),
            placeholder:"October 2025"})),
        e("div",{style:{flex:"1 1 150px"}},e("label",{style:lbl,htmlFor:"b-theme"},"Theme"),
          e("input",{id:"b-theme",style:field,value:s.theme,onChange:up("theme"),
            placeholder:"Comfort & Hope"})),
        e("div",{style:{flex:"1 1 150px"}},e("label",{style:lbl,htmlFor:"b-style"},"Style"),
          e("input",{id:"b-style",style:field,value:s.style,onChange:up("style"),
            placeholder:"after Ben Rector"}))),
      e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        e("div",{style:{flex:"1 1 240px"}},e("label",{style:lbl,htmlFor:"b-talkurl"},"Talk URL"),
          e("input",{id:"b-talkurl",style:field,value:s.talkUrl,onChange:up("talkUrl"),
            placeholder:"churchofjesuschrist.org/…"})),
        e("div",{style:{flex:"1 1 200px"}},e("label",{style:lbl,htmlFor:"b-yt"},"YouTube URL"),
          e("input",{id:"b-yt",style:field,value:s.youtube,onChange:up("youtube"),
            placeholder:"youtu.be/…"}))),
      e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        e("div",{style:{flex:"1 1 220px"}},
          e("label",{style:lbl,htmlFor:"b-prev"},"Preview start (seconds into the song)"),
          e("input",{id:"b-prev",type:"number",min:"0",style:field,value:s.previewStart,
            onChange:up("previewStart"),placeholder:"0 — e.g. 45 to start at the chorus"})),
        e("div",{style:{flex:"1 1 200px"}},
          e("label",{style:lbl,htmlFor:"b-dur"},"Length (seconds, for video-only songs)"),
          e("input",{id:"b-dur",type:"number",min:"0",style:field,value:s.duration,
            onChange:up("duration"),placeholder:"auto-detected for MP3s"}))),
      e("div",null,e("label",{style:lbl,htmlFor:"b-gdoc"},"Import lyrics from a Google Doc"),
        e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          e("input",{id:"b-gdoc",style:{...field,flex:"1 1 240px"},value:gdocUrl,
            onChange:ev=>setGdocUrl(ev.target.value),
            placeholder:"Paste a Google Doc link (shared “anyone with the link”)"}),

          e("pre",{style:{whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",fontSize:14,

            background:"#1E3358",border:`1px solid ${C.line}`,borderRadius:8,padding:"12px 14px"}},
