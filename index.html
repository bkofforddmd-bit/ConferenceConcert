const { useState, useMemo, useEffect } = React;
const e = React.createElement;
const C = {brown:"#13294B",gold:"#F2C14E",cream:"#0A1628",text:"#EAF0FA",

// Share a link via the phone's native share sheet; fall back to copying.
// Returns a short status string for optional UI feedback.
async function shareOrCopy({title,text,url}){
  try{
    if(navigator.share){
      await navigator.share({title,text,url});
      return "shared";
    }
  }catch(err){
    if(err&&err.name==="AbortError")return "cancelled"; // user closed the sheet
  }
  try{
    if(navigator.clipboard){ await navigator.clipboard.writeText(url); return "copied"; }
  }catch(_){}
  return "failed";
}

// A small reusable Share button.
function ShareButton({title,text,url,label,small,style}){
  const [status,setStatus]=useState("");
  async function go(ev){
    ev&&ev.stopPropagation();
    const r=await shareOrCopy({title,text,url});
    if(r==="copied")setStatus("Link copied!");
    else if(r==="failed")setStatus("Couldn't share");
    else setStatus("");
    if(r==="copied")setTimeout(()=>setStatus(""),2000);
  }
  return e("span",{style:{display:"inline-flex",alignItems:"center",gap:8}},
    e("button",{onClick:go,
      style:Object.assign({padding:small?"4px 12px":"8px 16px",fontSize:small?12:14,
        borderRadius:small?16:8,border:`1.5px solid ${C.blue}`,
        background:"transparent",color:C.blue,whiteSpace:"nowrap",cursor:"pointer"},style||{})},
      label||"Share"),
    status&&e("span",{style:{fontSize:12,color:C.src}},status));
}

const API = "/.netlify/functions";
const GROUPINGS = [
  {key:"session",label:"Session"},{key:"speaker",label:"Speaker"},
  {key:"theme",label:"Theme"},{key:"flat",label:"All songs"},
];
function ytId(url){if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
const PREVIEW_SECONDS=20;

/* Share a link via the phone's native share sheet, falling back to copy on desktop.
   Returns a short status string the caller can show briefly. */
async function shareLink(title,text,url){
  try{
    if(navigator.share){
      await navigator.share({title,text,url});
      return "shared";
    }
  }catch(err){
    if(err&&err.name==="AbortError")return "cancelled"; // user dismissed the sheet
  }
  try{
    if(navigator.clipboard){ await navigator.clipboard.writeText(url); return "copied"; }
  }catch(_){}
  // Last-ditch fallback
  try{ window.prompt("Copy this link:",url); }catch(_){}
  return "copied";
}

/* One shared <audio> element drives all 20s previews so only one plays at a time. */
const previewAudio=typeof Audio!=="undefined"?new Audio():null;
let previewStopTimer=null, previewOnEnd=null;
function stopPreview(){
  if(previewStopTimer){clearTimeout(previewStopTimer);previewStopTimer=null;}
  if(previewAudio){previewAudio.pause();}
  if(previewOnEnd){const f=previewOnEnd;previewOnEnd=null;f();}
}
function playPreview(song,onEnd){
  if(!previewAudio||!song.audioUrl)return;
  stopPreview();
  previewOnEnd=onEnd||null;
  const start=Math.max(0,parseInt(song.previewStart,10)||0);
  previewAudio.src=song.audioUrl;
  const begin=()=>{try{previewAudio.currentTime=start;}catch(_){}
    previewAudio.play().catch(()=>{});
    previewStopTimer=setTimeout(stopPreview,PREVIEW_SECONDS*1000);};
  if(previewAudio.readyState>=1)begin();
  else previewAudio.addEventListener("loadedmetadata",begin,{once:true});
}

const CONCERT_MAX_SECONDS=2*60*60; // 2 hours

/* Effective length of a song in seconds: measured/auto value if known, else band
   duration, else a sensible default so totals stay meaningful. */
function songSeconds(song,measured){
  const m=measured&&measured[song.id];
  if(m&&m>0)return m;
  const d=parseInt(song.duration,10);
  if(d>0)return d;
  return 210; // ~3.5 min fallback when truly unknown
}
function fmtTime(total){
  total=Math.round(total);
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
  if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return m+":"+String(s).padStart(2,"0");
}
/* Read duration from an audio URL via a throwaway element. Resolves seconds or 0. */
function measureAudio(url){
  return new Promise((res)=>{
    if(!url||typeof Audio==="undefined")return res(0);
    const a=new Audio();
    a.preload="metadata";
    const done=(v)=>{a.src="";res(v);};
    a.addEventListener("loadedmetadata",()=>done(isFinite(a.duration)?a.duration:0),{once:true});
    a.addEventListener("error",()=>done(0),{once:true});
    a.src=url;
  });
}

/* The suggested live-show arc. Each section guides one part of the set. */
const ARC=[
  {key:"opener", label:"Opener",  target:[1,1], hint:"Gather everyone in — a warm, inviting song to begin."},
  {key:"build",  label:"Build",   target:[2,3], hint:"Lift the energy. Momentum and joy."},
  {key:"reflect",label:"Reflect", target:[1,2], hint:"A quieter, sacred moment to turn inward."},
  {key:"peak",   label:"Peak",    target:[1,2], hint:"The testimony high point — the heart of the night."},
  {key:"closer", label:"Closer",  target:[1,1], hint:"Send them out — a song they carry home."},
];
function targetText(t){
  const [lo,hi]=t;
  const n=lo===hi?lo+"":lo+"–"+hi;
  return n+" song"+(hi===1?"":"s")+" works well here";
}

/* ----------------------------------------------------------- Header */
function Header({tab,setTab}){

      e("img",{src:"logo.png",alt:"Conference as a Concert",

          filter:"drop-shadow(0 4px 14px rgba(0,0,0,.4))"}}),
      e("div",{style:{fontSize:15,fontStyle:"italic",color:"#E8D9B8",marginTop:6}},
        "The Song Library"),
    ),
    e("nav",{style:{display:"flex",justifyContent:"center",gap:4,
      flexWrap:"wrap",padding:"14px 12px 0"}},
      tabs.map(([k,label])=>e("button",{key:k,onClick:()=>setTab(k),

          background:tab===k?C.cream:"transparent",

          borderBottom:tab===k?`3px solid ${C.gold}`:"3px solid transparent",
          fontWeight:tab===k?"bold":"normal",letterSpacing:"0.03em"}},label)),
    ),
  );
}

/* ----------------------------------------------------------- Player */
function Player({song}){
  const vid=ytId(song.youtube);
  const [mode,setMode]=useState(vid?"video":(song.audioUrl?"audio":"none"));
  useEffect(()=>{setMode(vid?"video":(song.audioUrl?"audio":"none"));},[song.id]);
  const hasVideo=!!vid,hasAudio=!!song.audioUrl;
  return e("div",{style:{background:C.paper,border:`1.5px solid ${C.line}`,
    borderTop:`4px solid ${C.gold}`,borderRadius:"0 0 12px 12px",padding:"18px 20px 22px"}},
    (hasVideo&&hasAudio)&&e("div",{style:{display:"flex",gap:8,marginBottom:14}},
      ["video","audio"].map(m=>e("button",{key:m,onClick:()=>setMode(m),
        "aria-pressed":mode===m,
        style:{padding:"6px 16px",fontSize:13,borderRadius:18,
          border:`1.5px solid ${mode===m?C.blue:C.line}`,
          background:mode===m?C.blue:"transparent",color:mode===m?"#fff":C.text}},
        m==="video"?"▶ Video":"♪ Audio only"))),
    mode==="video"&&hasVideo&&e("div",{style:{position:"relative",paddingBottom:"56.25%",
      height:0,borderRadius:8,overflow:"hidden",background:"#000"}},
      e("iframe",{src:`https://www.youtube.com/embed/${vid}`,title:song.title,
        allowFullScreen:true,
        allow:"accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture",
        style:{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:0}})),
    mode==="audio"&&hasAudio&&e("div",{style:{padding:"6px 0"}},
      e("audio",{controls:true,preload:"none",src:song.audioUrl,style:{width:"100%"}})),
    mode==="none"&&e("div",{style:{padding:"26px 16px",textAlign:"center",color:C.src,
      background:C.cream,borderRadius:8,fontStyle:"italic"}},
      "This song isn't streaming yet — check back soon."),
    e("div",{style:{marginTop:18,paddingTop:14,borderTop:`1px solid ${C.line}`,
      fontSize:14,lineHeight:1.55}},
      e("div",{style:{color:C.src,letterSpacing:"0.06em",fontSize:12,
        textTransform:"uppercase",marginBottom:4}},"Source talk"),
      song.talk&&e("div",{style:{fontWeight:"bold",fontSize:16}},"“"+song.talk+"”"),
      song.speaker&&song.speaker!=="—"&&e("div",{style:{color:C.text}},song.speaker),
      (song.session||song.style)&&e("div",{style:{color:C.src,fontSize:13,marginTop:2}},
        [song.session,song.style].filter(Boolean).join("  ·  ")),
      song.talkUrl&&e("a",{href:song.talkUrl,target:"_blank",rel:"noopener noreferrer",
        style:{display:"inline-block",marginTop:8,fontSize:14}},"Read the talk →"),
      e(LyricsToggle,{song})),
    e("div",{style:{marginTop:14,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}},
      song.audioUrl&&e(PreviewButton,{song}),
      e(ShareButton,{small:true,label:"Share song",
        title:"Conference as a Concert",
        text:"♪ “"+song.title+"”"+(song.talk?" — from “"+song.talk+"”":"")+" on Conference as a Concert",
        url:location.origin+location.pathname})),
  );
}

/* ------------------------------------------------------ Preview button */
function PreviewButton({song,small}){
  const [playing,setPlaying]=useState(false);
  useEffect(()=>()=>{ if(playing) stopPreview(); },[]);
  if(!song.audioUrl)return null;
  const toggle=(ev)=>{
    ev.stopPropagation();
    if(playing){stopPreview();setPlaying(false);}
    else{setPlaying(true);playPreview(song,()=>setPlaying(false));}
  };
  return e("button",{onClick:toggle,"aria-pressed":playing,
    title:"Hear a 20-second preview",
    style:{padding:small?"3px 10px":"5px 13px",fontSize:small?12:13,borderRadius:16,
      border:`1.5px solid ${playing?C.gold:C.line}`,
      background:playing?C.gold:"transparent",color:playing?C.brown:C.src,
      whiteSpace:"nowrap",transition:"all .15s"}},
    playing?"◼ Stop":"▶ 20s preview");
}

/* ----------------------------------------------------- Lyrics toggle */
function LyricsToggle({song,compact}){
  const [open,setOpen]=useState(false);
  if(!song.lyrics)return null;
  return e("span",{style:{display:compact?"inline":"block",marginTop:compact?0:8}},
    e("button",{onClick:(ev)=>{ev.stopPropagation();setOpen(!open);},"aria-expanded":open,
      style:{padding:compact?"2px 8px":"4px 12px",fontSize:compact?12:13,borderRadius:14,
        border:`1.5px solid ${open?C.gold:C.line}`,background:open?C.gold:"transparent",
        color:open?C.brown:C.blue,cursor:"pointer"}},
      open?"Hide lyrics":"♪ Lyrics"),
    open&&e("pre",{style:{whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",fontSize:14,
      lineHeight:1.55,color:C.text,background:C.cream,border:`1px solid ${C.line}`,
      borderRadius:8,padding:"14px 16px",marginTop:8}},song.lyrics));
}

/* Compact talk + lyrics links for arc/set-list rows. */
function RowLinks({song}){
  if(!song.talkUrl&&!song.lyrics)return null;
  return e("div",{style:{display:"flex",gap:10,alignItems:"center",marginTop:3}},
    song.talkUrl&&e("a",{href:song.talkUrl,target:"_blank",rel:"noopener noreferrer",
      onClick:ev=>ev.stopPropagation(),
      style:{fontSize:12,color:C.blue}},"Talk →"),
    song.lyrics&&e(LyricsToggle,{song,compact:true}));
}

/* ------------------------------------------------------- Share button */
function ShareButton({title,text,url,label,small}){
  const [status,setStatus]=useState("");
  async function go(ev){
    ev&&ev.stopPropagation();
    const r=await shareLink(title,text,url);
    if(r==="copied"){setStatus("Link copied!");setTimeout(()=>setStatus(""),1800);}
    else if(r==="shared"){setStatus("Shared!");setTimeout(()=>setStatus(""),1500);}
  }
  return e("span",{style:{display:"inline-flex",alignItems:"center",gap:8}},
    e("button",{onClick:go,
      style:{padding:small?"5px 12px":"8px 16px",fontSize:small?12:14,borderRadius:small?16:8,
        border:`1.5px solid ${C.blue}`,background:"transparent",color:C.blue,
        fontWeight:"bold",whiteSpace:"nowrap",cursor:"pointer"}},
      (label||"Share")),
    status&&e("span",{style:{fontSize:12,color:C.gold}},status));
}

/* --------------------------------------------------------- Song card */
function SongCard({song,open,onToggle,canEdit,onEdited}){
  const [editing,setEditing]=useState(false);
  const vid=ytId(song.youtube);
  const badge=vid?"▶ Video":(song.audioUrl?"♪ Audio":"Coming soon");
  const badgeColor=vid?C.blue:(song.audioUrl?C.src:"#6B7FA3");
  return e("div",{style:{background:open?C.paper:"#1E3358",borderRadius:12,
    border:`1.5px solid ${open?C.gold:C.line}`,
    boxShadow:open?"0 6px 20px rgba(44,26,14,.12)":"0 1px 3px rgba(44,26,14,.06)",
    overflow:"hidden",transition:"border-color .15s,box-shadow .15s"}},
    e("button",{onClick:onToggle,"aria-expanded":open,
      style:{width:"100%",textAlign:"left",background:"transparent",border:0,
        padding:"16px 18px",display:"flex",gap:14,alignItems:"flex-start"}},
      e("div",{style:{flex:1,minWidth:0}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}},
          e("span",{style:{fontSize:19,fontWeight:"bold",color:C.gold}},song.title),
          e("span",{style:{fontSize:11,color:"#fff",background:badgeColor,
            padding:"2px 9px",borderRadius:12}},badge)),
        song.talk&&e("div",{style:{fontSize:14,color:C.text,marginTop:5,fontStyle:"italic"}},
          "from “"+song.talk+"”"+(song.speaker&&song.speaker!=="—"?" · "+song.speaker:"")),
        song.blurb&&e("div",{style:{fontSize:13.5,color:C.src,marginTop:6,lineHeight:1.5}},song.blurb)),
      e("span",{"aria-hidden":true,style:{fontSize:20,color:C.gold,
        transform:open?"rotate(180deg)":"none",transition:"transform .2s",marginTop:2}},"⌄")),
    open&&!editing&&e("div",null,
      e(Player,{song}),
      canEdit&&e("div",{style:{padding:"0 20px 16px"}},
        e("button",{onClick:()=>setEditing(true),
          style:{padding:"7px 16px",fontSize:13,borderRadius:8,
            border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},
          "✎ Edit this song"))),
    open&&editing&&e(SongEditor,{song,
      onDone:(updated)=>{setEditing(false);if(updated)onEdited&&onEdited();},
    }),
  );
}

/* ---------------------------------------------------------- Library */
function Library({songs,loading,error,onReload}){
  const [group,setGroup]=useState("session");
  const [query,setQuery]=useState("");
  const [openId,setOpenId]=useState(null);
  const canEdit=!!sessionStorage.getItem("cac_pw");
  const filtered=useMemo(()=>{
    const q=query.trim().toLowerCase();
    if(!q)return songs;
    return songs.filter(s=>[s.title,s.talk,s.speaker,s.theme,s.session,s.style]
      .filter(Boolean).join(" ").toLowerCase().includes(q));
  },[query,songs]);
  const groups=useMemo(()=>{
    if(group==="flat")return[{name:null,items:filtered}];
    const map=new Map();
    filtered.forEach(s=>{const k=s[group]||"Other";if(!map.has(k))map.set(k,[]);map.get(k).push(s);});
    return[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([name,items])=>({name,items}));
  },[group,filtered]);

  return e("main",{style:{maxWidth:920,margin:"0 auto",padding:"0 20px 60px"}},
    e("div",{style:{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center",
      justifyContent:"space-between",padding:"22px 0 6px"}},
      e("div",{role:"group","aria-label":"Group songs by",
        style:{display:"flex",flexWrap:"wrap",gap:6}},
        e("span",{style:{fontSize:13,color:C.src,alignSelf:"center",marginRight:4}},"Group by:"),
        GROUPINGS.map(g=>e("button",{key:g.key,onClick:()=>setGroup(g.key),
          "aria-pressed":group===g.key,
          style:{padding:"7px 14px",fontSize:14,borderRadius:20,
            border:`1.5px solid ${group===g.key?C.gold:C.line}`,
            background:group===g.key?C.gold:C.paper,
            color:group===g.key?"#0A1628":C.text}},g.label))),
      e("input",{type:"search",value:query,onChange:ev=>setQuery(ev.target.value),
        placeholder:"Search title, talk, speaker…","aria-label":"Search songs",
        style:{flex:"1 1 220px",maxWidth:300,padding:"9px 14px",fontSize:15,
          borderRadius:8,border:`1.5px solid ${C.line}`,background:C.paper,color:C.text}})),
    loading&&e("p",{style:{textAlign:"center",color:C.src,padding:"40px 0",fontStyle:"italic"}},
      "Loading the library…"),
    canEdit&&!loading&&e("div",{style:{background:C.paper,border:`1.5px solid ${C.gold}`,
      borderRadius:8,padding:"8px 14px",margin:"4px 0 14px",fontSize:13,color:C.src}},
      "Band mode is on — open any song to edit its details."),
    error&&e("p",{style:{textAlign:"center",color:"#E66A5C",padding:"20px 0"}},error),
    !loading&&!error&&filtered.length===0&&e("p",{style:{textAlign:"center",color:C.src,
      fontStyle:"italic",padding:"40px 0"}},
      songs.length===0?"No songs yet — the band will add the first one soon.":"No songs match your search."),
    groups.map((g,gi)=>e("section",{key:g.name||gi,style:{marginTop:gi?34:18}},
      g.name&&e("h2",{style:{fontSize:14,letterSpacing:"0.14em",textTransform:"uppercase",
        color:C.src,borderBottom:`1.5px solid ${C.line}`,paddingBottom:7,marginBottom:14}},
        g.name,e("span",{style:{color:"#7E97BD",marginLeft:8,fontSize:13}},g.items.length)),
      e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        g.items.map(s=>e(SongCard,{key:s.id,song:s,open:openId===s.id,
          canEdit,onEdited:onReload,
          onToggle:()=>setOpenId(openId===s.id?null:s.id)}))))),
  );
}

/* ---------------------------------------------------- Suggest form */
const field={padding:"10px 12px",fontSize:15,borderRadius:8,
  border:`1.5px solid ${C.line}`,background:"#1E3358",color:C.text,width:"100%"};
const lbl={fontSize:13,color:C.src,marginBottom:5,display:"block",letterSpacing:"0.03em"};

/* ------------------------------------------------- Song editor (band) */
function SongEditor({song,onDone}){
  const [f,setF]=useState({
    title:song.title||"",talk:song.talk||"",speaker:song.speaker||"",
    session:song.session||"",theme:song.theme||"",style:song.style||"",
    talkUrl:song.talkUrl||"",youtube:song.youtube||"",
    previewStart:song.previewStart?String(song.previewStart):"",
    duration:song.duration?String(song.duration):"",
    lyrics:song.lyrics||"",blurb:song.blurb||"",
  });
  const [state,setState]=useState("idle");
  const [msg,setMsg]=useState("");
  const up=(k)=>(ev)=>setF({...f,[k]:ev.target.value});
  const pw=sessionStorage.getItem("cac_pw")||"";

  async function save(){
    setState("saving");setMsg("");
    try{
      const r=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"update",song:{...f,id:song.id}})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not save");
      setState("done");onDone&&onDone(true);
    }catch(err){setState("error");setMsg(err.message);}
  }
  async function del(){
    if(!window.confirm("Remove “"+song.title+"” from the library? This can't be undone."))return;
    setState("saving");setMsg("");
    try{
      const r=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"delete",id:song.id})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not delete");
      onDone&&onDone(true);
    }catch(err){setState("error");setMsg(err.message);}
  }

  const half={flex:"1 1 150px"};
  return e("div",{style:{background:C.paper,borderTop:`4px solid ${C.gold}`,
    padding:"18px 20px 22px"}},
    e("div",{style:{fontSize:12,letterSpacing:"0.06em",textTransform:"uppercase",
      color:C.src,marginBottom:12}},"Editing song"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
      e("div",null,e("label",{style:lbl},"Title"),
        e("input",{style:field,value:f.title,onChange:up("title")})),
      e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
        e("div",{style:{flex:"1 1 240px"}},e("label",{style:lbl},"Source talk"),
          e("input",{style:field,value:f.talk,onChange:up("talk")})),
        e("div",{style:{flex:"1 1 160px"}},e("label",{style:lbl},"Speaker"),
          e("input",{style:field,value:f.speaker,onChange:up("speaker")}))),

function Band({onAdded}){
  const [pw,setPw]=useState(sessionStorage.getItem("cac_pw")||"");
  const [showPw,setShowPw]=useState(false);
  const [file,setFile]=useState(null);
  const [drag,setDrag]=useState(false);
  const [s,setS]=useState({title:"",talk:"",speaker:"",session:"",theme:"",
    style:"",talkUrl:"",youtube:"",previewStart:"",duration:"",lyrics:"",blurb:""});
  const [state,setState]=useState("idle");
  const [msg,setMsg]=useState("");
  const [gdocUrl,setGdocUrl]=useState("");
  const [gdocState,setGdocState]=useState("idle"); // idle|loading|preview|error
  const [gdocMsg,setGdocMsg]=useState("");
  const [gdocPreview,setGdocPreview]=useState(""); // fetched text, awaiting confirmation
  const [projMsg,setProjMsg]=useState("");

  // Import everything from a music-video-studio project JSON.
  function importProject(f){
    if(!f)return;
    setProjMsg("Reading project file…");
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(String(r.result));
        const meta=(d.scene&&d.scene.meta)||{};
        const next={...s};
        if(meta.songTitle)next.title=meta.songTitle;
        if(meta.speaker)next.speaker=meta.speaker;
        if(meta.conferenceMonthYear)next.session=meta.conferenceMonthYear;
        if(d.styleReference)next.style="after "+d.styleReference;
        const lyr=d.finalLyrics||d.lyrics;
        if(lyr)next.lyrics=lyr;
        if(meta.session&&!next.blurb)next.blurb=meta.session;
        setS(next);
        setProjMsg("Filled in from project file — review the fields, then add the MP3 and save.");
      }catch(err){setProjMsg("Couldn't read that file — make sure it's a project .json export.");}
    };
    r.onerror=()=>setProjMsg("Couldn't read that file.");
    r.readAsText(f);
  }
  const up=(k)=>(ev)=>setS({...s,[k]:ev.target.value});

  async function importGdoc(){
    if(!gdocUrl.trim()){setGdocState("error");setGdocMsg("Paste a Google Doc link first.");return;}
    setGdocState("loading");setGdocMsg("");setGdocPreview("");
    try{
      const r=await fetch(`${API}/gdoc`,{method:"POST",
        headers:{"Content-Type":"application/json"},body:JSON.stringify({url:gdocUrl})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not import");
      setGdocPreview(d.lyrics);
      setGdocState("preview");
      setGdocMsg("");
    }catch(err){setGdocState("error");setGdocMsg(err.message);}
  }
  function useImported(){
    setS(v=>({...v,lyrics:gdocPreview}));
    setGdocState("idle");setGdocPreview("");
    setGdocMsg("Lyrics added below — edit if needed before saving.");
  }
  function cancelImport(){
    setGdocState("idle");setGdocPreview("");setGdocMsg("");
  }

  function pick(f){
    if(!f)return;
    if(!/^audio\//.test(f.type)&&!/\.(mp3|m4a|wav|ogg|aac)$/i.test(f.name)){
      setMsg("Please choose an audio file (mp3, m4a, wav…).");setState("error");return;}
    setFile(f);setMsg("");if(state==="error")setState("idle");
    if(!s.title){const base=f.name.replace(/\.[^.]+$/,"");setS(v=>({...v,title:base}));}
  }
  // Read an audio file's duration (seconds) in the browser before saving.
  function readDuration(f){return new Promise((res)=>{
    try{
      const url=URL.createObjectURL(f); const a=new Audio();
      a.preload="metadata";
      a.addEventListener("loadedmetadata",()=>{const d=isFinite(a.duration)?Math.round(a.duration):0;
        URL.revokeObjectURL(url);res(d);},{once:true});
      a.addEventListener("error",()=>{URL.revokeObjectURL(url);res(0);},{once:true});
      a.src=url;
    }catch(_){res(0);}
  });}

  async function submit(){
    if(!pw){setState("error");setMsg("Enter the band password.");return;}
    if(!s.title.trim()){setState("error");setMsg("Give the song a title.");return;}
    if(!file&&!s.youtube&&!s.talkUrl){setState("error");
      setMsg("Add an MP3 or at least a YouTube link.");return;}
    setState("sending");setMsg(file?"Uploading…":"Saving…");
    try{
      const song={...s};
      if(file){
        // 1) ask the function for a presigned URL
        const ct=file.type||"audio/mpeg";
        const signRes=await fetch(`${API}/upload`,{method:"POST",
          headers:{"Content-Type":"application/json","x-upload-password":pw},
          body:JSON.stringify({action:"sign",filename:file.name,contentType:ct,titleHint:s.title})});
        const signData=await signRes.json();
        if(!signRes.ok)throw new Error(signData.error||"Could not start upload");
        // 2) upload the file bytes straight to R2 (bypasses Netlify size limit)
        const putRes=await fetch(signData.uploadUrl,{method:"PUT",
          headers:{"Content-Type":ct},body:file});
        if(!putRes.ok)throw new Error("File upload to storage failed ("+putRes.status+")");
        song.audioUrl=signData.publicUrl;
        // capture duration if the band didn't type one
        if(!s.duration){const dur=await readDuration(file); if(dur)song.duration=String(dur);}
      }
      // 3) save the song into the catalog
      const saveRes=await fetch(`${API}/upload`,{method:"POST",
        headers:{"Content-Type":"application/json","x-upload-password":pw},
        body:JSON.stringify({action:"save",song})});
      const d=await saveRes.json();
      if(!saveRes.ok)throw new Error(d.error||"Could not save song");
      sessionStorage.setItem("cac_pw",pw);
      setState("done");setMsg("");setFile(null);
      setS({title:"",talk:"",speaker:"",session:"",theme:"",style:"",talkUrl:"",youtube:"",previewStart:"",duration:"",lyrics:"",blurb:""});
      setGdocUrl("");setGdocState("idle");setGdocMsg("");setGdocPreview("");setProjMsg("");
      onAdded&&onAdded(d.entry);
    }catch(err){setState("error");setMsg(err.message);}
  }

  return e("main",{style:{maxWidth:620,margin:"0 auto",padding:"28px 20px 60px"}},

      "Band members only. Drop an MP3, add the talk details, and the song goes live for everyone."),
    e("div",null,e("label",{style:lbl,htmlFor:"b-pw"},"Band password"),
      e("div",{style:{display:"flex",gap:8,alignItems:"center",maxWidth:320}},
        e("input",{id:"b-pw",type:showPw?"text":"password",style:{...field,maxWidth:260},value:pw,
          onChange:ev=>setPw(ev.target.value),placeholder:"••••••••"}),
        e("button",{type:"button",onClick:()=>setShowPw(!showPw),
          "aria-label":showPw?"Hide password":"Show password",
          style:{padding:"8px 12px",fontSize:13,borderRadius:8,
            border:`1.5px solid ${C.line}`,background:"transparent",color:C.src,
            whiteSpace:"nowrap"}},showPw?"Hide":"Show")),
      pw&&e("div",{style:{fontSize:12,color:C.src,marginTop:4}},
        "Length: "+pw.length+" characters"+(/^\s|\s$/.test(pw)?" — ⚠ starts or ends with a space":""))),
    e("div",{style:{marginTop:18,border:`1.5px solid ${C.gold}`,borderRadius:12,
      background:C.paper,padding:"16px 18px"}},
      e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:4}},
        "Quick fill from a project file"),
      e("p",{style:{fontSize:13,color:C.src,lineHeight:1.5,margin:"0 0 10px"}},
        "Have a music-video-studio project export (.json)? Drop it here to auto-fill the title, speaker, session, style, and lyrics — then just add the MP3 below."),
      e("label",{style:{display:"inline-block",padding:"8px 16px",fontSize:14,
        borderRadius:8,background:C.blue,color:"#fff",cursor:"pointer"}},
        "Choose project .json",
        e("input",{type:"file",accept:".json,application/json",
          onChange:ev=>importProject(ev.target.files[0]),style:{display:"none"}})),
      projMsg&&e("div",{style:{fontSize:13,color:C.src,marginTop:8}},projMsg)),
    e("div",{onDragOver:ev=>{ev.preventDefault();setDrag(true);},
      onDragLeave:()=>setDrag(false),
      onDrop:ev=>{ev.preventDefault();setDrag(false);pick(ev.dataTransfer.files[0]);},
      style:{marginTop:18,border:`2.5px dashed ${drag?C.gold:C.line}`,borderRadius:12,
        background:drag?C.paper:"#1E3358",padding:"30px 20px",textAlign:"center",
        transition:"all .15s"}},
      e("div",{style:{fontSize:30,color:C.gold,marginBottom:6}},"♪"),
      e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:4}},
        file?file.name:"Drag an MP3 here"),

/* ----------------------------------------------------- Concert builder */
function ConcertBuilder({songs,loading}){
  // picked: array of {id, section} so songs can belong to an arc section (or "").
  const [picked,setPicked]=useState([]);
  const [name,setName]=useState("");
  const [query,setQuery]=useState("");
  const [useArc,setUseArc]=useState(false);
  const [addingTo,setAddingTo]=useState(null); // section key the user is filling, or null
  const [measured,setMeasured]=useState({});   // songId -> seconds
  const [state,setState]=useState("idle");
  const [shareUrl,setShareUrl]=useState("");
  const [msg,setMsg]=useState("");
  const byId=useMemo(()=>new Map(songs.map(s=>[s.id,s])),[songs]);

  // Measure durations of audio songs once, so totals are real.
  useEffect(()=>{
    let alive=true;
    (async()=>{
      for(const s of songs){
        if(s.audioUrl&&!(s.id in measured)){
          const secs=await measureAudio(s.audioUrl);
          if(!alive)return;
          if(secs>0)setMeasured(m=>({...m,[s.id]:secs}));
        }
      }
    })();
    return ()=>{alive=false;};
  },[songs]);

  const pickedSongs=picked.map(p=>({...p,song:byId.get(p.id)})).filter(p=>p.song);
  const totalSecs=pickedSongs.reduce((t,p)=>t+songSeconds(p.song,measured),0);
  const atCap=totalSecs>=CONCERT_MAX_SECONDS;
  const overCap=totalSecs>CONCERT_MAX_SECONDS;

  const available=useMemo(()=>{
    const q=query.trim().toLowerCase();
    const inSet=new Set(picked.map(p=>p.id));
    return songs.filter(s=>!inSet.has(s.id)).filter(s=>
      !q||[s.title,s.talk,s.speaker].filter(Boolean).join(" ").toLowerCase().includes(q));
  },[songs,picked,query]);

  function add(id,section){
    // Hard cap: block adding once we've REACHED the limit. A song added while
    // still under is allowed to finish beyond the limit.
    if(atCap){setMsg("You've reached the 2-hour limit — remove a song to add another.");
      setState("error");return;}
    setMsg("");if(state==="error")setState("idle");
    setPicked([...picked,{id,section:section||""}]);
    setAddingTo(null);
  }
  const remove=(id)=>setPicked(picked.filter(p=>p.id!==id));
  function move(id,dir){
    const i=picked.findIndex(p=>p.id===id), j=i+dir;
    if(i<0||j<0||j>=picked.length)return;
    const next=picked.slice(); const t=next[i]; next[i]=next[j]; next[j]=t; setPicked(next);
  }

  function startArc(){ setUseArc(true); setMsg(""); }

  function surpriseMe(){
    if(songs.length===0){setState("error");setMsg("No songs in the library yet.");return;}
    // Shuffle a working copy of all songs (Fisher–Yates).
    const pool=songs.slice();
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
      [pool[i],pool[j]]=[pool[j],pool[i]];}
    let idx=0; const next=()=>idx<pool.length?pool[idx++]:null;

    const result=[]; let secs=0;
    const room=(s)=>secs<CONCERT_MAX_SECONDS; // finish-the-song rule: allow if under before adding
    const place=(song,section)=>{
      if(!song)return false;
      if(!room(song))return false;
      result.push({id:song.id,section});
      secs+=songSeconds(song,measured);
      return true;
    };

    // 1) Seed each arc section with its minimum (in arc order).
    for(const sec of ARC){
      const [lo]=sec.target;
      for(let k=0;k<lo;k++){ if(!room()) break; place(next(),sec.key); }
    }
    // 2) Expand toward ~2 hours, adding to the sections a live show grows:
    //    Build and Reflect, alternating, until we'd reach the cap or run out.
    const growth=["build","reflect","build"];
    let g=0;
    while(idx<pool.length && secs<CONCERT_MAX_SECONDS){
      const sec=growth[g%growth.length]; g++;
      if(!place(next(),sec)) break;
    }
    // Order the result by arc section so the set reads Opener→…→Closer.
    const orderOf=(k)=>{const i=ARC.findIndex(a=>a.key===k);return i<0?ARC.length:i;};
    result.sort((a,b)=>orderOf(a.section)-orderOf(b.section));

    setUseArc(true);
    setPicked(result);
    setState("idle");
    setMsg("");
    if(!name)setName("A Surprise Concert");
  }

  async function save(){
    if(picked.length===0){setState("error");setMsg("Add at least one song.");return;}
    setState("saving");setMsg("");
    try{
      const r=await fetch(`${API}/concert`,{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:name||"My Concert",songIds:picked.map(p=>p.id)})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not save");
      setShareUrl(`${location.origin}${location.pathname}?concert=${d.id}`);
      setState("done");
    }catch(err){setState("error");setMsg(err.message);}
  }

  if(loading)return e("main",{style:{maxWidth:920,margin:"0 auto",padding:"40px 20px"}},
    e("p",{style:{textAlign:"center",color:C.src,fontStyle:"italic"}},"Loading songs…"));

  // A small reusable row for a picked song.
  const pickedRow=(p,i)=>e("div",{key:p.id,
    style:{display:"flex",alignItems:"center",gap:10,background:C.paper,
      border:`1.5px solid ${C.line}`,borderRadius:10,padding:"10px 12px"}},
    e("div",{style:{display:"flex",flexDirection:"column",gap:2}},
      e("button",{onClick:()=>move(p.id,-1),disabled:i===0,"aria-label":"Move up",
        style:{border:0,background:"transparent",color:i===0?"#5A78A8":C.src,
          fontSize:14,cursor:i===0?"default":"pointer",lineHeight:1}},"▲"),
      e("button",{onClick:()=>move(p.id,1),disabled:i===pickedSongs.length-1,
        "aria-label":"Move down",
        style:{border:0,background:"transparent",
          color:i===pickedSongs.length-1?"#5A78A8":C.src,
          fontSize:14,cursor:i===pickedSongs.length-1?"default":"pointer",lineHeight:1}},"▼")),
    e("span",{style:{color:C.gold,fontWeight:"bold",width:20,textAlign:"right"}},i+1),
    e("div",{style:{flex:1,minWidth:0}},
      e("div",{style:{fontWeight:"bold",color:C.gold,fontSize:15}},p.song.title),
      e("div",{style:{fontSize:12,color:C.src,fontStyle:"italic",
        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
        (p.song.talk?p.song.talk+" · ":"")+fmtTime(songSeconds(p.song,measured))
        +(measured[p.song.id]||p.song.duration>0?"":" (est.)")),
      e(RowLinks,{song:p.song})),
    e(PreviewButton,{song:p.song,small:true}),
    e("button",{onClick:()=>remove(p.id),"aria-label":"Remove",
      style:{border:0,background:"transparent",color:"#E66A5C",fontSize:18,lineHeight:1}},"×"));

  // Picker list (shared by free-add and per-section add).
  const picker=(section)=>e("div",{style:{display:"flex",flexDirection:"column",gap:8,
    marginTop:section?10:14}},
    available.length===0
      ? e("p",{style:{color:C.src,fontStyle:"italic"}},
          songs.length===0?"No songs in the library yet.":"Nothing left to add.")
      : available.map(s=>e("div",{key:s.id,
          style:{display:"flex",alignItems:"center",gap:10,background:"#1E3358",
            border:`1.5px solid ${C.line}`,borderRadius:10,padding:"10px 12px"}},
          e("div",{style:{flex:1,minWidth:0}},
            e("div",{style:{fontWeight:"bold",color:C.gold,fontSize:15}},s.title),
            e("div",{style:{fontSize:12,color:C.src,fontStyle:"italic",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
              (s.talk?"from “"+s.talk+"” · ":"")+fmtTime(songSeconds(s,measured))
              +(measured[s.id]||s.duration>0?"":" (est.)")),
            e(RowLinks,{song:s})),
          e(PreviewButton,{song:s,small:true}),
          e("button",{onClick:()=>add(s.id,section),disabled:atCap,
            style:{padding:"6px 14px",fontSize:13,borderRadius:16,border:0,
              background:atCap?"#2C467A":C.gold,color:"#0A1628",fontWeight:"bold",
              whiteSpace:"nowrap",cursor:atCap?"default":"pointer"}},"+ Add"))));

  const timeColor=overCap?"#E66A5C":(atCap?C.src:C.gold);

  return e("main",{style:{maxWidth:920,margin:"0 auto",padding:"24px 20px 60px"}},
    e("p",{style:{color:C.src,lineHeight:1.6,marginTop:0}},
      "Preview songs, add the ones you love, and arrange your set. Save to get a share link anyone can play."),

    /* time meter */
    e("div",{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",
      background:C.paper,border:`1.5px solid ${overCap?"#E66A5C":C.line}`,
      borderRadius:10,padding:"12px 16px",marginBottom:20}},
      e("div",{style:{fontSize:22,fontWeight:"bold",color:timeColor,minWidth:90}},
        fmtTime(totalSecs)),
      e("div",{style:{flex:1,minWidth:160}},
        e("div",{style:{height:8,background:"#22375E",borderRadius:5,overflow:"hidden"}},
          e("div",{style:{height:"100%",width:Math.min(100,totalSecs/CONCERT_MAX_SECONDS*100)+"%",
            background:overCap?"#E66A5C":C.gold,transition:"width .2s"}})),
        e("div",{style:{fontSize:12,color:C.src,marginTop:4}},
          atCap?"2-hour limit reached — remove a song to add more."
               :"of a 2-hour maximum  ·  "+pickedSongs.length+" songs")),
    ),

    e("div",{style:{display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}},

      /* ---------------- left: the set list ---------------- */
      e("div",{style:{flex:"1 1 340px",order:1}},
        e("div",{style:{display:"flex",justifyContent:"space-between",
          alignItems:"baseline",borderBottom:`2px solid ${C.gold}`,paddingBottom:7}},
          e("h2",{style:{fontSize:14,letterSpacing:"0.12em",textTransform:"uppercase",
            color:C.gold,margin:0}},"Your set list ",
            e("span",{style:{color:"#7E97BD"}},"("+pickedSongs.length+")"))),
        e("input",{value:name,onChange:ev=>setName(ev.target.value),
          placeholder:"Name your concert…",style:{...field,margin:"14px 0"}}),

        !useArc&&picked.length===0&&e("div",{style:{background:"#1E3358",
          border:`1.5px dashed ${C.gold}`,borderRadius:12,padding:"18px",marginBottom:14}},
          e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:4}},
            "Not sure where to start?"),
          e("p",{style:{fontSize:13.5,color:C.src,lineHeight:1.5,margin:"0 0 12px"}},
            "Follow a suggested arc — five moments that shape a memorable night: "
            +"Opener, Build, Reflect, Peak, Closer."),
          e("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
            e("button",{onClick:startArc,
              style:{padding:"9px 18px",fontSize:14,borderRadius:8,border:0,
                background:C.blue,color:"#0A1628"}},"Start from a suggested arc"),
            e("button",{onClick:surpriseMe,
              style:{padding:"9px 18px",fontSize:14,borderRadius:8,
                border:`1.5px solid ${C.gold}`,background:C.gold,color:"#0A1628",
                fontWeight:"bold"}},"🎲 Surprise me — build a 2-hour concert"))),

        /* arc view */
        useArc
          ? e("div",{style:{display:"flex",flexDirection:"column",gap:18}},
              ARC.map(sec=>{
                const rows=pickedSongs.filter(p=>p.section===sec.key);
                const n=rows.length, [lo,hi]=sec.target;
                const cue=n===0?null:(n>=lo&&n<=hi
                  ?{txt:"✓ just right",col:"#5FB87A"}
                  :(n>hi?{txt:"more than suggested",col:"#E0A03A"}:null));
                return e("div",{key:sec.key,style:{border:`1.5px solid ${C.line}`,
                  borderRadius:12,padding:"14px",background:"#1E3358"}},
                  e("div",{style:{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}},
                    e("div",{style:{fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",
                      color:C.gold,fontWeight:"bold"}},sec.label),
                    cue&&e("span",{style:{fontSize:12,color:cue.col,fontWeight:"bold"}},cue.txt)),
                  e("div",{style:{fontSize:13,color:C.src,fontStyle:"italic",
                    margin:"3px 0 2px"}},sec.hint),
                  e("div",{style:{fontSize:12,color:"#7E97BD",margin:"0 0 10px"}},
                    targetText(sec.target)),
                  rows.length>0&&e("div",{style:{display:"flex",flexDirection:"column",
                    gap:8,marginBottom:10}},
                    rows.map(p=>pickedRow(p,picked.findIndex(x=>x.id===p.id)))),
                  addingTo===sec.key
                    ? e("div",null,
                        e("input",{type:"search",value:query,
                          onChange:ev=>setQuery(ev.target.value),
                          placeholder:"Search the library…",style:{...field}}),
                        picker(sec.key),
                        e("button",{onClick:()=>{setAddingTo(null);setQuery("");},
                          style:{marginTop:8,padding:"6px 14px",fontSize:13,borderRadius:8,
                            border:`1.5px solid ${C.line}`,background:"transparent",
                            color:C.src}},"Done"))
                    : e("button",{onClick:()=>{setAddingTo(sec.key);setQuery("");},
                        disabled:atCap,
                        style:{padding:"7px 14px",fontSize:13,borderRadius:16,
                          border:`1.5px solid ${atCap?"#2C467A":C.gold}`,
                          background:"transparent",color:atCap?"#7E97BD":C.src,
                          cursor:atCap?"default":"pointer"}},
                        "+ Add to "+sec.label));
              }),
              e("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
                e("button",{onClick:surpriseMe,
                  style:{padding:"7px 14px",fontSize:13,borderRadius:8,
                    border:`1.5px solid ${C.gold}`,background:"transparent",color:C.src}},
                  "🎲 Reshuffle (2-hour concert)"),
                e("button",{onClick:()=>setUseArc(false),
                  style:{padding:"7px 14px",fontSize:13,borderRadius:8,
                    border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},
                  "Switch to a free-form list")))
          : pickedSongs.length>0
            ? e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                pickedSongs.map((p,i)=>pickedRow(p,i)))
            : !useArc&&e("p",{style:{color:C.src,fontStyle:"italic",padding:"4px 0"}},
                "No songs yet — add some from the right, or start from the arc above."),

        /* save */
        picked.length>0&&e("div",{style:{marginTop:18}},
          state==="done"
            ? e("div",{style:{background:C.paper,border:`1.5px solid ${C.gold}`,
                borderRadius:10,padding:"16px"}},
                e("div",{style:{fontWeight:"bold",color:C.gold,marginBottom:8}},
                  "Your concert is saved ♪"),
                e("input",{readOnly:true,value:shareUrl,onFocus:ev=>ev.target.select(),
                  style:{...field,fontSize:13,marginBottom:8}}),
                e("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
                  e(ShareButton,{small:true,label:"Share concert",
                    title:"A Concert — Conference as a Concert",
                    text:"🎶 Listen to “"+(name||"my concert")+"” — a concert I built on Conference as a Concert",
                    url:shareUrl}),
                  e("button",{onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(shareUrl);},
                    style:{padding:"8px 16px",fontSize:13,borderRadius:8,border:0,
                      background:C.blue,color:"#0A1628"}},"Copy link"),
                  e("a",{href:shareUrl,
                    style:{padding:"8px 16px",fontSize:13,borderRadius:8,
                      background:C.blue,color:"#fff",textDecoration:"none"}},"Play it now →")))
            : e("button",{onClick:save,disabled:state==="saving",
                style:{padding:"12px 24px",fontSize:15,borderRadius:8,border:0,
                  background:state==="saving"?"#3A5582":C.blue,color:"#0A1628"}},
                state==="saving"?"Saving…":"Save & get share link")),
        state==="error"&&e("p",{style:{color:"#E66A5C",marginTop:10}},msg)),

      /* ---------------- right: free-form library add ---------------- */
      !useArc&&e("div",{style:{flex:"1 1 320px",order:2}},
        e("h2",{style:{fontSize:14,letterSpacing:"0.12em",textTransform:"uppercase",
          color:C.gold,borderBottom:`2px solid ${C.line}`,paddingBottom:7}},"Add songs"),
        e("input",{type:"search",value:query,onChange:ev=>setQuery(ev.target.value),
          placeholder:"Search the library…",style:{...field,margin:"14px 0 0"}}),
        picker(null)),
    ),
  );
}

/* ------------------------------------------------------ Concert player */
function ConcertPlayer({id}){
  const [data,setData]=useState(null);
  const [error,setError]=useState("");
  const [idx,setIdx]=useState(-1); // -1 = not started
  const [playing,setPlaying]=useState(false);
  const audioRef=React.useRef(null);

  useEffect(()=>{ stopPreview(); // make sure no library preview is running
    (async()=>{
      try{
        const r=await fetch(`${API}/concert?id=${encodeURIComponent(id)}`);
        const d=await r.json();
        if(!r.ok)throw new Error(d.error||"Could not load concert");
        setData(d);
      }catch(err){setError(err.message);}
    })();
  },[id]);

  const songs=data?data.songs:[];
  const current=idx>=0?songs[idx]:null;
  const curVid=current?ytId(current.youtube):null;

  // Drive audio playback when the current (audio) song changes.
  useEffect(()=>{
    if(!current)return;
    if(current.audioUrl&&!curVid&&audioRef.current){
      audioRef.current.src=current.audioUrl;
      audioRef.current.currentTime=0;
      audioRef.current.play().then(()=>setPlaying(true)).catch(()=>setPlaying(false));
    }
  },[idx]);

  const start=()=>{ if(songs.length){setIdx(0);} };
  const next=()=>{ setIdx(i=>i+1<songs.length?i+1:i); if(idx+1>=songs.length)setPlaying(false); };
  const prev=()=>{ setIdx(i=>i>0?i-1:0); };

  const back=()=>{ const u=location.origin+location.pathname; history.pushState({},"",u);
    location.reload(); };

  if(error)return e("main",{style:{maxWidth:620,margin:"0 auto",padding:"50px 20px",textAlign:"center"}},
    e("p",{style:{color:"#E66A5C"}},error),
    e("button",{onClick:back,style:{padding:"10px 20px",borderRadius:8,border:0,
      background:C.blue,color:"#0A1628"}},"Back to the library"));
  if(!data)return e("main",{style:{maxWidth:620,margin:"0 auto",padding:"50px 20px",textAlign:"center"}},
    e("p",{style:{color:C.src,fontStyle:"italic"}},"Loading the concert…"));

  return e("main",{style:{maxWidth:760,margin:"0 auto",padding:"28px 20px 60px"}},
    e("div",{style:{textAlign:"center",marginBottom:20}},
      e("div",{style:{fontSize:12,letterSpacing:"0.3em",textTransform:"uppercase",
        color:C.gold,marginBottom:6}},"A Concert"),
      e("h2",{style:{margin:0,fontSize:"clamp(24px,4.5vw,36px)",color:C.gold}},data.name),
      e("div",{style:{color:C.src,fontSize:14,marginTop:6}},songs.length+" songs")),

    idx<0
      ? e("div",{style:{textAlign:"center",padding:"30px 0"}},
          e("button",{onClick:start,disabled:songs.length===0,
            style:{padding:"16px 38px",fontSize:18,borderRadius:30,border:0,
              background:C.blue,color:"#0A1628",boxShadow:"0 4px 14px rgba(44,26,14,.2)"}},
            "▶ Play concert"),
          e("p",{style:{color:C.src,fontSize:13,marginTop:14}},
            "Plays start to finish. Audio advances automatically; video songs you advance yourself."))
      : e("div",null,
          /* now playing */
          e("div",{style:{background:C.paper,border:`1.5px solid ${C.gold}`,
            borderRadius:12,padding:"20px"}},
            e("div",{style:{fontSize:12,color:C.src,letterSpacing:"0.06em",
              textTransform:"uppercase",marginBottom:6}},
              "Now playing · "+(idx+1)+" of "+songs.length),
            e("div",{style:{fontSize:22,fontWeight:"bold",color:C.gold}},current.title),
            current.talk&&e("div",{style:{fontStyle:"italic",color:C.text,marginTop:3}},
              "from “"+current.talk+"”"+(current.speaker&&current.speaker!=="—"?" · "+current.speaker:"")),

            curVid
              ? e("div",{style:{position:"relative",paddingBottom:"56.25%",height:0,
                  borderRadius:8,overflow:"hidden",background:"#000",marginTop:14}},
                  e("iframe",{src:`https://www.youtube.com/embed/${curVid}?autoplay=1`,
                    title:current.title,allowFullScreen:true,
                    allow:"accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture",
                    style:{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:0}}))
              : current.audioUrl
                ? e("audio",{ref:audioRef,controls:true,style:{width:"100%",marginTop:14},
                    onEnded:next})
                : e("div",{style:{padding:"20px",textAlign:"center",color:C.src,
                    fontStyle:"italic",marginTop:14}},"(No media for this song yet)")),

          /* transport */
          e("div",{style:{display:"flex",gap:10,justifyContent:"center",
            alignItems:"center",marginTop:18,flexWrap:"wrap"}},
            e("button",{onClick:prev,disabled:idx===0,
              style:{padding:"10px 18px",borderRadius:8,border:`1.5px solid ${C.line}`,
                background:"#1E3358",color:idx===0?"#5A78A8":C.text}},"⏮ Prev"),
            e("button",{onClick:next,disabled:idx>=songs.length-1,
              style:{padding:"10px 22px",borderRadius:8,border:0,
                background:idx>=songs.length-1?"#3A5582":C.blue,color:"#0A1628"}},
              idx>=songs.length-1?"Last song":"Next ⏭")),
          (curVid)&&e("p",{style:{textAlign:"center",color:C.src,fontSize:13,marginTop:10}},
            "Press Next when the video finishes to continue the concert."),

          /* upcoming */
          e("div",{style:{marginTop:24}},
            e("div",{style:{fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",
              color:C.src,marginBottom:8}},"Set list"),
            e("div",{style:{display:"flex",flexDirection:"column",gap:4}},
              songs.map((s,i)=>e("button",{key:s.id+i,onClick:()=>setIdx(i),
                style:{display:"flex",gap:10,alignItems:"center",textAlign:"left",
                  padding:"8px 12px",borderRadius:8,border:0,cursor:"pointer",
                  background:i===idx?C.gold:"transparent",
                  color:i===idx?C.brown:C.text}},
                e("span",{style:{width:18,color:i===idx?C.brown:"#7E97BD",
                  fontWeight:"bold"}},i+1),
                e("span",{style:{fontWeight:i===idx?"bold":"normal"}},s.title)))))),

    e("div",{style:{textAlign:"center",marginTop:30,display:"flex",gap:12,
      justifyContent:"center",flexWrap:"wrap"}},
      e(ShareButton,{label:"Share this concert",
        title:"A Concert — Conference as a Concert",
        text:"🎶 Listen to “"+(data.name||"this concert")+"” on Conference as a Concert",
        url:location.href}),
      e("button",{onClick:back,style:{padding:"9px 18px",fontSize:13,borderRadius:8,
        border:`1.5px solid ${C.line}`,background:"transparent",color:C.src}},
        "← Back to the library")),
  );
}

/* --------------------------------------------------------------- App */
function App(){
  const concertId=new URLSearchParams(location.search).get("concert");
  const [tab,setTab]=useState("library");
  const [songs,setSongs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  async function load(){
    setLoading(true);setError("");
    try{
      const r=await fetch(`${API}/data`);
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Could not load");
      setSongs(d.songs||[]);
    }catch(err){setError("Couldn't load the library. "+err.message);}
    finally{setLoading(false);}
  }
  useEffect(()=>{ if(!concertId) load(); },[]);

  // Shared concert link: skip the tabbed UI, go straight to playback.
  if(concertId)return e("div",null,
    e(Header,{tab:"_concert",setTab:()=>{}}),
    e(ConcertPlayer,{id:concertId}),
    e("footer",{style:{textAlign:"center",padding:"26px 20px",color:C.src,fontSize:13,
      borderTop:`1px solid ${C.line}`,background:C.paper}},
      "Conference as a Concert · Y-Mountain Music Co."),
  );

  return e("div",null,
    e(Header,{tab,setTab}),
    tab==="library"&&e(Library,{songs,loading,error,onReload:load}),
    tab==="concert"&&e(ConcertBuilder,{songs,loading}),
    tab==="suggest"&&e(Suggest),
    tab==="band"&&e(Band,{onAdded:()=>{setTab("library");load();}}),
    e("footer",{style:{textAlign:"center",padding:"26px 20px",color:C.src,fontSize:13,
      borderTop:`1px solid ${C.line}`,background:C.paper}},
      e("div",{style:{marginBottom:14}},
        e(ShareButton,{label:"Share the app",
          title:"Conference as a Concert",
          text:"🎶 Conference as a Concert — General Conference talks set to music. Stream songs and build your own concert:",
          url:location.origin+location.pathname})),
      "Conference as a Concert · Y-Mountain Music Co."),
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));

// Register the service worker so the app is installable on phones.
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
